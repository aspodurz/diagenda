<section class="plan-stepper-container">
  <header>
    <h2>{{ stepTitles.at(selectedIndex) | translate }}</h2>
  </header>   

    <div [ngTemplateOutlet]="selected ? selected.content : null"></div>

    <footer class="plan-stepper-step-navigation-bar">
      <button mat-raised-button class="plan-stepper-nav-button" [disabled]="isFirstStep()" cdkStepperPrevious><mat-icon>arrow_back</mat-icon></button>

      <button mat-raised-button class="plan-stepper-nav-button" [disabled]="isNextDisabled()" cdkStepperNext><mat-icon>arrow_forward</mat-icon></button>
    </footer>
    <div class="item-container">
        <button mat-raised-button [routerLink]="['/configurer-component']">{{ 'app.button.back' | translate }}</button>
    </div>
</section>
