<p>
<button mat-icon-button [matMenuTriggerFor]="appMenu" aria-label="Home page menu">
  <mat-icon>more_vert</mat-icon>
</button>
<mat-label>{{ getTitle() | translate }}</mat-label>
</p>


<mat-menu #appMenu="matMenu">
  <ng-template matMenuContent>
    <button mat-menu-item [routerLink]="['/home-component']" (click)="setTitle('app.home.title')" >
      <mat-icon>home</mat-icon>
      <span>{{ 'app.home.title'| translate }}</span>
    </button>
    <button mat-menu-item [routerLink]="['/home-component']" (click)="setTitle('app.viewer.title')" >
      <mat-icon>view_list</mat-icon>
      <span>{{ 'app.viewer.title'| translate }}</span>
    </button>
	<button mat-menu-item [routerLink]="['/setting-component']" (click)="setTitle('app.setting.title')" >
      <mat-icon>settings</mat-icon>
      <span>{{ 'app.setting.title'| translate }}</span>
    </button>
    <button mat-menu-item [routerLink]="['/about-component']" (click)="setTitle('app.about.title')" >
      <mat-icon>info</mat-icon>
      <span>{{ 'app.about.title'| translate }}</span>
    </button>
  </ng-template>
</mat-menu>

<!-- The routed views render in the <router-outlet>-->
<router-outlet></router-outlet>
