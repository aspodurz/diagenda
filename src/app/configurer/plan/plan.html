<div class="container-data">
    <mat-form-field class="field-full-width">
        <mat-label>{{ 'app.planner.name' | translate }}</mat-label>
        <input matInput placeholder="{{ 'app.planner.ph.name' | translate }}" [(ngModel)]="plan().name" [disabled]="mode() === 'edit'" planNameValidator required>
    </mat-form-field>
    <mat-form-field class="field-full-width">
        <mat-label>{{ 'app.planner.description' | translate }}</mat-label>
        <input matInput placeholder="{{ 'app.planner.ph.description' | translate }}" [(ngModel)]="plan().description" required>
    </mat-form-field>
    <mat-form-field class="field-full-width">
        <mat-label>{{ 'app.planner.patient' | translate }}</mat-label>
        <input matInput placeholder="{{ 'app.planner.ph.patient' | translate }}" [(ngModel)]="plan().patient" required>
    </mat-form-field>
</div>
